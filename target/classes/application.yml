spring:
  profiles:
    active: dev

app:
  jwt:
    secret: "DigitalDetoxSuperSecretKeyForJWT2024ChangeInProduction!!"
    expiration-ms: 86400000  # 24 ore

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:file:./data/digitaldetox;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  simulation:
    enabled: true
    schedule-cron: "0 */5 * * * *"  # ogni 5 minuti

logging:
  level:
    com.digitaldetox: DEBUG
    org.springframework.security: INFO

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://localhost:3306/digitaldetox?useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  simulation:
    enabled: false

logging:
  level:
    com.digitaldetox: INFO

server:
  port: ${PORT:8080}
